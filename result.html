<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知时 - 传统文化分析报告 | knowbazi.online</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/result.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="YOUR_UMAMI_ID"></script>
</head>
<body>
    <div class="bg-layer">
        <canvas id="bgCanvas"></canvas>
        <div class="bg-overlay"></div>
    </div>

    <div class="result-container">
        <!-- 顶部信息栏 -->
        <header class="result-header">
            <a href="index.html" class="back-link">← 重新分析</a>
            <h1 class="result-title">知时</h1>
            <div class="birth-info">
                <span id="genderLabel"></span>
                <span class="info-sep">|</span>
                <span id="birthDateText"></span>
                <span class="info-sep">|</span>
                <span id="birthHourText"></span>
            </div>
            <div class="nayin-info">
                纳音：<span id="nayinText"></span>
                <span class="info-sep">|</span>
                真太阳时：<span id="solarTimeText"></span>
            </div>
            <button class="share-btn" onclick="shareResult()" title="复制分享链接">🔗 分享报告</button>
            <button class="share-btn download-btn" id="downloadBtn" onclick="downloadReport()" style="display:none;background:rgba(212,175,55,0.15)" title="下载完整报告到本地">📥 下载完整报告</button>
        </header>

        <!-- ==================== 大运流年区域 ==================== -->
        <section class="section-dayun">
            <div class="section-header">
                <h2>大运</h2>
                <span class="section-sub" id="dayunDirection"></span>
            </div>
            <div class="dayun-scroll-wrapper">
                <div class="dayun-table" id="dayunTable">
                    <!-- 由JS动态生成 -->
                </div>
            </div>
        </section>

        <!-- ==================== 流年详情区域 ==================== -->
        <section class="section-liunian" id="liunianSection">
            <div class="section-header">
                <h2>流年</h2>
                <span class="section-sub" id="liunianRange"></span>
            </div>
            <div class="liunian-scroll-wrapper">
                <div class="liunian-table" id="liunianTable">
                    <!-- 由JS动态生成 -->
                </div>
            </div>
        </section>

        <!-- ==================== 四柱主盘 ==================== -->
        <section class="section-sizhu">
            <div class="section-header">
                <h2>四柱盘面</h2>
            </div>
            
            <!-- 专业盘面表格 -->
            <div class="paipan-table">
                <!-- 表头：流年/大运/四柱名称 -->
                <div class="pp-row pp-header">
                    <div class="pp-label"></div>
                    <div class="pp-col pp-liunian-col">流年</div>
                    <div class="pp-col pp-dayun-col">大运</div>
                    <div class="pp-col">年柱</div>
                    <div class="pp-col">月柱</div>
                    <div class="pp-col pp-day">日柱</div>
                    <div class="pp-col">时柱</div>
                </div>

                <!-- 十神（天干） -->
                <div class="pp-row pp-ss-row">
                    <div class="pp-label">十神</div>
                    <div class="pp-col pp-liunian-col" id="ss-liunian-gan"></div>
                    <div class="pp-col pp-dayun-col" id="ss-dayun-gan"></div>
                    <div class="pp-col" id="ss-year-gan"></div>
                    <div class="pp-col" id="ss-month-gan"></div>
                    <div class="pp-col pp-day"><span class="day-master-tag">日主</span></div>
                    <div class="pp-col" id="ss-hour-gan"></div>
                </div>

                <!-- 天干 -->
                <div class="pp-row pp-gan-row">
                    <div class="pp-label">天干</div>
                    <div class="pp-col pp-liunian-col"><span class="tian-gan" id="gan-liunian"></span></div>
                    <div class="pp-col pp-dayun-col"><span class="tian-gan" id="gan-dayun"></span></div>
                    <div class="pp-col"><span class="tian-gan" id="gan-year"></span></div>
                    <div class="pp-col"><span class="tian-gan" id="gan-month"></span></div>
                    <div class="pp-col pp-day"><span class="tian-gan day-master-gan" id="gan-day"></span></div>
                    <div class="pp-col"><span class="tian-gan" id="gan-hour"></span></div>
                </div>

                <!-- 地支 -->
                <div class="pp-row pp-zhi-row">
                    <div class="pp-label">地支</div>
                    <div class="pp-col pp-liunian-col"><span class="di-zhi" id="zhi-liunian"></span></div>
                    <div class="pp-col pp-dayun-col"><span class="di-zhi" id="zhi-dayun"></span></div>
                    <div class="pp-col"><span class="di-zhi" id="zhi-year"></span></div>
                    <div class="pp-col"><span class="di-zhi" id="zhi-month"></span></div>
                    <div class="pp-col pp-day"><span class="di-zhi" id="zhi-day"></span></div>
                    <div class="pp-col"><span class="di-zhi" id="zhi-hour"></span></div>
                </div>

                <!-- 十神（地支） -->
                <div class="pp-row pp-ss-row">
                    <div class="pp-label">十神</div>
                    <div class="pp-col pp-liunian-col" id="ss-liunian-zhi"></div>
                    <div class="pp-col pp-dayun-col" id="ss-dayun-zhi"></div>
                    <div class="pp-col" id="ss-year-zhi"></div>
                    <div class="pp-col" id="ss-month-zhi"></div>
                    <div class="pp-col pp-day" id="ss-day-zhi"></div>
                    <div class="pp-col" id="ss-hour-zhi"></div>
                </div>

                <!-- 藏干（含十神） -->
                <div class="pp-row pp-cang-row">
                    <div class="pp-label">藏干</div>
                    <div class="pp-col pp-cang pp-liunian-col" id="cang-liunian"></div>
                    <div class="pp-col pp-cang pp-dayun-col" id="cang-dayun"></div>
                    <div class="pp-col pp-cang" id="cang-year"></div>
                    <div class="pp-col pp-cang" id="cang-month"></div>
                    <div class="pp-col pp-cang pp-day" id="cang-day"></div>
                    <div class="pp-col pp-cang" id="cang-hour"></div>
                </div>

                <!-- 神煞 -->
                <div class="pp-row pp-shensha-row">
                    <div class="pp-label">神煞</div>
                    <div class="pp-col pp-shensha pp-liunian-col" id="shensha-liunian"></div>
                    <div class="pp-col pp-shensha pp-dayun-col" id="shensha-dayun"></div>
                    <div class="pp-col pp-shensha" id="shensha-year"></div>
                    <div class="pp-col pp-shensha" id="shensha-month"></div>
                    <div class="pp-col pp-shensha pp-day" id="shensha-day"></div>
                    <div class="pp-col pp-shensha" id="shensha-hour"></div>
                </div>
            </div>
        </section>

        <!-- ==================== 专业解读（抽屉式·默认关闭） ==================== -->
        <section class="section-drawer section-pro" id="proSection">
            <div class="section-header drawer-toggle" onclick="toggleDrawer('proSection')">
                <span class="drawer-arrow">▶</span>
                <h2>专业解读</h2>
                <span class="section-sub">神煞 · 五行 · 日柱</span>
            </div>
            <div class="drawer-body">
                <!-- 神煞详解 -->
                <div class="pro-sub">
                    <div class="pro-sub-title">神煞详解 <span class="pro-sub-count" id="shenshaCount"></span></div>
                    <div class="shensha-accordion" id="shenshaAccordion"></div>
                </div>
                <!-- 五行分析 -->
                <div class="pro-sub">
                    <div class="pro-sub-title">五行分析</div>
                    <div class="wuxing-stats">
                        <div class="wx-item" id="wx-jin" data-wx="金"><span class="wx-name">金</span><div class="wx-bar"><div class="wx-fill"></div></div><span class="wx-num">0</span></div>
                        <div class="wx-item" id="wx-mu" data-wx="木"><span class="wx-name">木</span><div class="wx-bar"><div class="wx-fill"></div></div><span class="wx-num">0</span></div>
                        <div class="wx-item" id="wx-shui" data-wx="水"><span class="wx-name">水</span><div class="wx-bar"><div class="wx-fill"></div></div><span class="wx-num">0</span></div>
                        <div class="wx-item" id="wx-huo" data-wx="火"><span class="wx-name">火</span><div class="wx-bar"><div class="wx-fill"></div></div><span class="wx-num">0</span></div>
                        <div class="wx-item" id="wx-tu" data-wx="土"><span class="wx-name">土</span><div class="wx-bar"><div class="wx-fill"></div></div><span class="wx-num">0</span></div>
                    </div>
                    <div class="wuxing-summary" id="wuxingSummary"></div>
                </div>
                <!-- 日主解析·滴天髓 -->
                <div class="pro-sub">
                    <div class="pro-sub-title">日主解析 · 滴天髓</div>
                    <div class="rizhu-content" id="rizhuContent"></div>
                </div>
            </div>
        </section>

        <!-- ==================== 日主性格（大白话） ==================== -->
        <section class="section-drawer section-character" id="characterSection">
            <div class="section-header drawer-toggle" onclick="toggleDrawer('characterSection')">
                <span class="drawer-arrow">▶</span>
                <h2>日主性格</h2>
            </div>
            <div class="drawer-body">
                <div class="character-content" id="characterContent"></div>
            </div>
        </section>

        <!-- ==================== 父母关系 ==================== -->
        <section class="section-drawer section-parents" id="parentsSection">
            <div class="section-header drawer-toggle" onclick="toggleDrawer('parentsSection')">
                <span class="drawer-arrow">▶</span>
                <h2>父母关系</h2>
            </div>
            <div class="drawer-body">
                <div class="parents-content" id="parentsContent"></div>
            </div>
        </section>

        <!-- ==================== 今年运势 ==================== -->
        <section class="section-drawer section-thisyear" id="thisYearSection">
            <div class="section-header drawer-toggle" onclick="toggleDrawer('thisYearSection')">
                <span class="drawer-arrow">▶</span>
                <h2>今年运势</h2>
            </div>
            <div class="drawer-body">
                <div class="thisyear-content" id="thisYearContent"></div>
            </div>
        </section>

        <!-- ==================== 婚姻感情（夫妻宫+配偶年龄合并） ==================== -->
        <section class="section-drawer section-marriage" id="marriageSection">
            <div class="section-header drawer-toggle" onclick="toggleDrawer('marriageSection')">
                <span class="drawer-arrow">▶</span>
                <h2>婚姻感情</h2>
            </div>
            <div class="drawer-body">
                <div class="marriage-content" id="marriageContent"></div>
            </div>
        </section>

        <!-- ==================== 财运分析 ==================== -->
        <section class="section-drawer section-wealth" id="wealthSection">
            <div class="section-header drawer-toggle" onclick="toggleDrawer('wealthSection')">
                <span class="drawer-arrow">▶</span>
                <h2>财运分析</h2>
            </div>
            <div class="drawer-body">
                <div class="wealth-content" id="wealthContent"></div>
            </div>
        </section>

        <!-- ==================== 学业分析 ==================== -->
        <section class="section-drawer section-study" id="studySection">
            <div class="section-header drawer-toggle" onclick="toggleDrawer('studySection')">
                <span class="drawer-arrow">▶</span>
                <h2>学业分析</h2>
            </div>
            <div class="drawer-body">
                <div class="study-content" id="studyContent"></div>
            </div>
        </section>

        <!-- ==================== 近5年流年运势 ==================== -->
        <section class="section-drawer section-fortune" id="fortuneSection">
            <div class="section-header drawer-toggle" onclick="toggleDrawer('fortuneSection')">
                <span class="drawer-arrow">▶</span>
                <h2>近5年流年运势</h2>
            </div>
            <div class="drawer-body">
                <div class="fortune-content" id="fortuneContent"></div>
            </div>
        </section>

        <!-- 底部声明 -->
        <footer class="result-footer">
            <p>※ 本分析报告仅供学习参考与娱乐交流，不构成任何决策建议</p>
            <p class="contact-info">📱 有任何问题，请联系客服微信 vx：EriverLife</p>
        </footer>
    </div>

    <script src="js/bazi.js"></script>
    <script src="js/bg-animation.js"></script>
    <script src="js/result.js"></script>
    <script src="js/paywall.js"></script>
    <script>
    function shareResult() {
        var btn = document.querySelector('.share-btn');
        var url = window.location.href;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(function() {
                btn.textContent = '✓ 已复制链接'; btn.classList.add('copied');
                setTimeout(function() { btn.textContent = '🔗 分享报告'; btn.classList.remove('copied'); }, 2000);
            });
        } else {
            var ta = document.createElement('textarea'); ta.value = url;
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
            btn.textContent = '✓ 已复制链接'; btn.classList.add('copied');
            setTimeout(function() { btn.textContent = '🔗 分享报告'; btn.classList.remove('copied'); }, 2000);
        }
    }
    </script>
</body>
</html>
